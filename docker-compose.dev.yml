services:
  web-dev:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: web-dev
    ports:
      - "18084:3000"
    environment:
      # Browser calls the API on the host-published port (not the Docker service name).
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:18082}
    depends_on:
      master-service-dev:
        condition: service_healthy
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

  postgres-dev:
    image: postgres:16-alpine
    container_name: postgres-dev
    environment:
      POSTGRES_DB: verifai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d verifai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  master-service-dev:
    build:
      context: ./master-service
      dockerfile: Dockerfile.dev
    container_name: master-service-dev
    ports:
      - "18082:8080"
    # For /student/login and browser calls from web-dev: set AUTH_JWT_SECRET and (if needed) CORS_ALLOWED_ORIGINS in master-service/.env.
    env_file:
      - ./master-service/.env
    environment:
      RESUME_ANALYZER_BASE_URL: http://resume-analyzer-dev:8080
      CODING_ANALYZER_BASE_URL: http://coding-analyzer-dev:8080
      MARKSHEET_ANALYZER_BASE_URL: http://marksheet-analyzer-dev:8080
      JD_ANALYZER_BASE_URL: http://jd-analyzer-dev:8080
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres-dev:5432/verifai
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 25s
    depends_on:
      postgres-dev:
        condition: service_healthy
      resume-analyzer-dev:
        condition: service_started
      coding-analyzer-dev:
        condition: service_started
      marksheet-analyzer-dev:
        condition: service_started
      jd-analyzer-dev:
        condition: service_started
    volumes:
      - ./master-service:/app
    restart: unless-stopped

  coding-analyzer-dev:
    build:
      context: ./coding-analyzer
      dockerfile: Dockerfile.dev
    container_name: coding-analyzer-dev
    ports:
      - "18080:8080"
    volumes:
      - ./coding-analyzer:/app
    restart: unless-stopped

  resume-analyzer-dev:
    build:
      context: ./resume-analyzer
      dockerfile: Dockerfile.dev
    container_name: resume-analyzer-dev
    ports:
      - "18081:8080"
    volumes:
      - ./resume-analyzer:/app
    restart: unless-stopped

  marksheet-analyzer-dev:
    build:
      context: ./marksheet-analyzer
      dockerfile: Dockerfile.dev
    container_name: marksheet-analyzer-dev
    ports:
      - "18083:8080"
    volumes:
      - ./marksheet-analyzer:/app
    restart: unless-stopped

  jd-analyzer-dev:
    build:
      context: ./jd-analyzer
      dockerfile: Dockerfile.dev
    container_name: jd-analyzer-dev
    ports:
      - "18085:8080"
    env_file:
      - ./jd-analyzer/.env
    volumes:
      - ./jd-analyzer:/app
    restart: unless-stopped

volumes:
  postgres-dev-data:
