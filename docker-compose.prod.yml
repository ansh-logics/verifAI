services:
  master-service:
    build:
      context: ./master-service
      dockerfile: Dockerfile.prod
    container_name: master-service
    ports:
      - "28082:8080"
    environment:
      RESUME_ANALYZER_BASE_URL: http://resume-analyzer:8080
      CODING_ANALYZER_BASE_URL: http://coding-analyzer:8080
      MARKSHEET_ANALYZER_BASE_URL: http://marksheet-analyzer:8080
    depends_on:
      - resume-analyzer
      - coding-analyzer
    restart: unless-stopped

  coding-analyzer:
    build:
      context: ./coding-analyzer
      dockerfile: Dockerfile.prod
    container_name: coding-analyzer
    ports:
      - "28080:8080"
    restart: unless-stopped

  resume-analyzer:
    build:
      context: ./resume-analyzer
      dockerfile: Dockerfile.prod
    container_name: resume-analyzer
    ports:
      - "28081:8080"
    restart: unless-stopped

  marksheet-analyzer:
    build:
      context: ./marksheet-analyzer
      dockerfile: Dockerfile.prod
    container_name: marksheet-analyzer
    ports:
      - "28083:8080"
    restart: unless-stopped
